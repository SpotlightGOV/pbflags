version: 2

builds:
  - id: pbflags-admin
    main: ./cmd/pbflags-admin
    binary: pbflags-admin
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: pbflags-evaluator
    main: ./cmd/pbflags-evaluator
    binary: pbflags-evaluator
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: protoc-gen-pbflags
    main: ./cmd/protoc-gen-pbflags
    binary: protoc-gen-pbflags
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: pbflags-sync
    main: ./cmd/pbflags-sync
    binary: pbflags-sync
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: pbflags-admin
    ids: [pbflags-admin]
    name_template: "pbflags-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

  - id: pbflags-evaluator
    ids: [pbflags-evaluator]
    name_template: "pbflags-evaluator_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

  - id: protoc-gen-pbflags
    ids: [protoc-gen-pbflags]
    name_template: "protoc-gen-pbflags_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

  - id: pbflags-sync
    ids: [pbflags-sync]
    name_template: "pbflags-sync_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

release:
  mode: replace
  replace_existing_artifacts: true

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

dockers_v2:
  - images:
      - "ghcr.io/spotlightgov/pbflags"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: docker/Dockerfile.goreleaser
    ids: [pbflags-admin, pbflags-evaluator, pbflags-sync]
    labels:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
    platforms:
      - linux/amd64
      - linux/arm64
