version: 2

builds:
  - id: pbflags-server
    main: ./cmd/pbflags-server
    binary: pbflags-server
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: protoc-gen-pbflags
    main: ./cmd/protoc-gen-pbflags
    binary: protoc-gen-pbflags
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: pbflags-sync
    main: ./cmd/pbflags-sync
    binary: pbflags-sync
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: pbflags-server
    ids: [pbflags-server]
    name_template: "pbflags-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

  - id: protoc-gen-pbflags
    ids: [protoc-gen-pbflags]
    name_template: "protoc-gen-pbflags_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

  - id: pbflags-sync
    ids: [pbflags-sync]
    name_template: "pbflags-sync_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  - images:
      - "ghcr.io/spotlightgov/pbflags-server"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: docker/Dockerfile.goreleaser
    ids: [pbflags-server, pbflags-sync]
    labels:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
    platforms:
      - linux/amd64
      - linux/arm64
