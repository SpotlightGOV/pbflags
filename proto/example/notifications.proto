syntax = "proto3";
package example;

import "pbflags/options.proto";

option go_package = "github.com/SpotlightGOV/pbflags/gen/example;examplepb";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.example.proto";

// Enum dimensions get typed constructors and sync-time value validation.
enum PlanLevel {
  PLAN_LEVEL_UNSPECIFIED = 0;
  PLAN_LEVEL_FREE = 1;
  PLAN_LEVEL_PRO = 2;
  PLAN_LEVEL_ENTERPRISE = 3;
}

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_DESKTOP = 1;
  DEVICE_TYPE_MOBILE = 2;
  DEVICE_TYPE_TABLET = 3;
}

// EvaluationContext defines the typed dimensions available for flag conditions.
// Exactly one message in the input files must carry the (pbflags.context) option.
message EvaluationContext {
  option (pbflags.context) = {};

  // String dimensions — identifiers with unbounded cardinality.
  string user_id = 1 [(pbflags.dimension) = {
    description: "Authenticated user identifier"
    hashable: true
  }];

  string session_id = 2 [(pbflags.dimension) = {
    description: "Browser session (unauthenticated users)"
    hashable: true
  }];

  // Enum dimensions — bounded cardinality, compile-time safe constructors.
  PlanLevel plan = 3 [(pbflags.dimension) = {description: "Subscription tier"}];

  DeviceType device_type = 4 [(pbflags.dimension) = {description: "Client device class"}];

  // Bool dimension.
  bool is_internal = 5 [(pbflags.dimension) = {description: "Internal employee"}];
}

// Notifications demonstrates how to define a feature with multiple flags.
// Each field annotated with (pbflags.flag) becomes a runtime-configurable flag.
message Notifications {
  option (pbflags.feature) = {
    id: "notifications"
    description: "Controls notification delivery behavior"
    owner: "platform-team"
  };

  // Enable email notifications.
  bool email_enabled = 1 [(pbflags.flag) = {
    description: "Enable email notifications"
    default: {
      bool_value: {value: true}
    }
  }];

  // How often to send digest emails.
  string digest_frequency = 2 [(pbflags.flag) = {
    description: "How often to send digest emails"
    default: {
      string_value: {value: "daily"}
    }
    supported_values: {
      string_values: [
        "hourly",
        "daily",
        "weekly"
      ]
    }
  }];

  // Maximum retry attempts for notification delivery.
  int64 max_retries = 3 [(pbflags.flag) = {
    description: "Maximum retry attempts"
    default: {
      int64_value: {value: 3}
    }
  }];

  // Minimum score threshold for triggering notifications.
  double score_threshold = 4 [(pbflags.flag) = {
    description: "Score threshold for notification triggers"
    default: {
      double_value: {value: 0.75}
    }
  }];

  // Email addresses for incident notifications.
  repeated string notification_emails = 5 [(pbflags.flag) = {
    description: "Email addresses for incident notifications"
    default: {
      string_list_value: {
        values: ["ops@example.com"]
      }
    }
  }];

  // Retry delay intervals in seconds.
  repeated int64 retry_delays = 6 [(pbflags.flag) = {
    description: "Retry delay intervals in seconds"
    default: {
      int64_list_value: {
        values: [
          1,
          5,
          30
        ]
      }
    }
  }];
}
