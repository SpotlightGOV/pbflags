syntax = "proto3";

package pbflags.v1;

option go_package = "github.com/SpotlightGOV/pbflags/gen/pbflags/v1;pbflagsv1";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.v1.proto";

// CompiledBundle is a pre-compiled config artifact containing everything
// needed to sync flag definitions and conditions to the database without
// requiring proto descriptors or the CEL compiler at load time.
//
// Produced by "pbflags compile", consumed by "pbflags load".
message CompiledBundle {
  repeated CompiledFeature features = 1;
  string cel_version = 2; // CEL library version used during compilation
  // All defined launches from config (feature-scoped and cross-feature).
  // Active/soaking/unkilled filtering happens at the evaluator.
  repeated CompiledLaunch launches = 3;
}

// CompiledFeature holds the compiled state for a single feature.
message CompiledFeature {
  string feature_id = 1;
  string display_name = 2;
  string description = 3;
  string owner = 4;
  repeated CompiledFlag flags = 5;
  // Field 6 was per-feature launches in the old model. Launches are now
  // at the bundle level (CompiledBundle.launches field 3).
  reserved 6;
}

// CompiledFlag holds a flag's compiled conditions and metadata.
message CompiledFlag {
  string flag_id = 1;
  string name = 2; // proto field name
  int32 field_number = 3;
  string flag_type = 4; // e.g. "BOOL", "STRING"
  bytes default_value = 5; // proto-encoded FlagValue
  bytes supported_values = 6;

  // Fields 7-8 were conditions_json / dimension_metadata_json (bytes).
  // Replaced by typed proto fields below.
  reserved 7, 8;

  // Typed condition chain. Empty for flags without conditions.
  repeated CompiledCondition conditions = 9;
  // Typed dimension metadata. Empty for flags without conditions.
  map<string, CompiledDimensionMeta> dimension_metadata = 10;
}

// CompiledCondition represents a single entry in a flag's condition chain.
message CompiledCondition {
  string cel = 1; // CEL expression text; empty = "otherwise" (always-match fallback)
  bytes value = 2; // proto-encoded FlagValue
  string comment = 3; // human-readable annotation from YAML config
  string launch_id = 4; // launch override (at most one per condition)
  bytes launch_value = 5; // proto-encoded FlagValue when entity is in launch ramp
}

// CompiledDimensionMeta holds classification metadata for a single dimension.
message CompiledDimensionMeta {
  string classification = 1; // bounded, finite_filter_uniform, finite_filter_distinct, unbounded
  repeated string literal_set = 2;
}

// StoredConditions wraps a condition chain for DB storage as bytea.
message StoredConditions {
  repeated CompiledCondition conditions = 1;
}

// StoredDimensionMetadata wraps dimension metadata for DB storage as bytea.
message StoredDimensionMetadata {
  map<string, CompiledDimensionMeta> dimensions = 1;
}

// CompiledLaunch holds a launch definition ready for DB upsert.
// Launch-to-flag binding is expressed inline via launch overrides on
// individual CompiledConditions, not on the launch definition.
message CompiledLaunch {
  string launch_id = 1;
  // Field 2 was flag_id — binding is now inline in conditions.
  reserved 2;
  string dimension = 3;
  // Field 4 was population_cel — targeting handled by condition when clauses.
  reserved 4;
  // Field 5 was value_json — values are per-condition overrides now.
  reserved 5;
  optional int32 ramp_percentage = 6; // ramp (0-100); authoritative when set in config
  // Where the launch is defined. Empty for cross-feature launches (launches/ dir).
  string scope_feature_id = 7;
  // All features that reference this launch. Populated by sync.
  repeated string affected_features = 8;
  string description = 9;
  // Optional rollout-step progression (each value 0-100, sorted ascending,
  // unique). Used by the admin UI as the quick-pick chips in the ramp
  // editor; empty = use UI defaults. Authoritative when set in config —
  // not adjustable from the UI.
  repeated int32 ramp_steps = 10;
}
