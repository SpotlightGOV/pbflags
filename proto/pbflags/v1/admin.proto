syntax = "proto3";
package pbflags.v1;

import "google/protobuf/timestamp.proto";
import "pbflags/options.proto";
import "pbflags/v1/types.proto";

option go_package = "github.com/SpotlightGOV/pbflags/gen/pbflags/v1;pbflagsv1";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.v1.proto";

// FlagAdmin is the UI-facing API for flag management. Used by admin
// dashboards to manage flag state, overrides, and view audit logs.
// Flag definitions are read directly from descriptors.pb via filesystem mount.
service FlagAdminService {
  rpc ListFeatures(ListFeaturesRequest) returns (ListFeaturesResponse);
  rpc GetFlag(GetFlagRequest) returns (GetFlagResponse);
  rpc UpdateFlagState(UpdateFlagStateRequest) returns (UpdateFlagStateResponse);
  rpc SetFlagOverride(SetFlagOverrideRequest) returns (SetFlagOverrideResponse);
  rpc RemoveFlagOverride(RemoveFlagOverrideRequest) returns (RemoveFlagOverrideResponse);
  rpc GetAuditLog(GetAuditLogRequest) returns (GetAuditLogResponse);

  // Launch lifecycle RPCs.
  rpc ListLaunches(ListLaunchesRequest) returns (ListLaunchesResponse);
  rpc GetLaunch(GetLaunchRequest) returns (GetLaunchResponse);
  rpc UpdateLaunchRamp(UpdateLaunchRampRequest) returns (UpdateLaunchRampResponse);
  rpc UpdateLaunchStatus(UpdateLaunchStatusRequest) returns (UpdateLaunchStatusResponse);
  rpc KillLaunch(KillLaunchRequest) returns (KillLaunchResponse);
  rpc UnkillLaunch(UnkillLaunchRequest) returns (UnkillLaunchResponse);

  // Global config-sync lock RPCs.
  rpc AcquireSyncLock(AcquireSyncLockRequest) returns (AcquireSyncLockResponse);
  rpc ReleaseSyncLock(ReleaseSyncLockRequest) returns (ReleaseSyncLockResponse);
  rpc GetSyncLock(GetSyncLockRequest) returns (GetSyncLockResponse);

  // Per-condition value override RPCs.
  rpc SetConditionOverride(SetConditionOverrideRequest) returns (SetConditionOverrideResponse);
  rpc ClearConditionOverride(ClearConditionOverrideRequest) returns (ClearConditionOverrideResponse);
  rpc ClearAllConditionOverrides(ClearAllConditionOverridesRequest) returns (ClearAllConditionOverridesResponse);
  rpc ListConditionOverrides(ListConditionOverridesRequest) returns (ListConditionOverridesResponse);
}

message ListFeaturesRequest {}

message ListFeaturesResponse {
  repeated FeatureDetail features = 1;
}

message FeatureDetail {
  string feature_id = 1;
  string description = 2;
  string owner = 3;
  repeated FlagDetail flags = 4;
}

message FlagDetail {
  string flag_id = 1;
  string display_name = 2;
  string description = 3;
  FlagType flag_type = 4;
  string layer = 5;
  State state = 6;
  FlagValue default_value = 7;
  FlagValue current_value = 8;
  repeated FlagOverrideDetail overrides = 9;

  // Metadata from proto descriptors.
  pbflags.SupportedValues supported_values = 10;
  bool archived = 11;

  // Active condition value overrides on this flag.
  repeated ConditionOverrideDetail condition_overrides = 12;
  // True when config-as-code currently manages this flag's conditions
  // (i.e., the owning feature has a non-empty sync_sha). Operators get
  // a warning when overriding a config-managed flag.
  bool config_managed = 13;
  // The compiled condition chain in evaluation order. Empty for static
  // (conditionless) flags. Used by `pb condition list` and the admin UI
  // to show overrides inline against the chain.
  repeated ConditionDetail conditions = 14;
}

// ConditionDetail describes one entry in a flag's condition chain.
message ConditionDetail {
  // 0-based index into the chain.
  int32 index = 1;
  // CEL expression text; empty = "otherwise" (always-match fallback).
  string cel = 2;
  // Compiled value returned when this condition matches.
  FlagValue value = 3;
  // Human-readable annotation from YAML config (optional).
  string comment = 4;
  // Launch ID, when a launch is overriding this condition for ramped entities.
  string launch_id = 5;
  // Value returned when the entity is in the launch ramp (optional).
  FlagValue launch_value = 6;
}

// ConditionOverrideDetail describes one active override attached to a flag.
message ConditionOverrideDetail {
  // Absent = override of the static/compiled default (or "otherwise" row).
  optional int32 condition_index = 1;
  FlagValue override_value = 2;
  // The compiled chain value (or static default) at this position before
  // the override was applied. Populated by GetFlag for the confirmation UX.
  FlagValue original_value = 3;
  OverrideSource source = 4;
  string actor = 5;
  string reason = 6;
  google.protobuf.Timestamp created_at = 7;
}

message FlagOverrideDetail {
  string entity_id = 1;
  State state = 2;
  FlagValue value = 3;
}

message GetFlagRequest {
  string flag_id = 1;
}

message GetFlagResponse {
  FlagDetail flag = 1;
}

message UpdateFlagStateRequest {
  string flag_id = 1;
  State state = 2;
  FlagValue value = 3; // Optional: set value at the same time.
  string actor = 4;
}

message UpdateFlagStateResponse {}

// Validates: flag must have a non-GLOBAL layer. Value type must match flag type.
message SetFlagOverrideRequest {
  string flag_id = 1;
  string entity_id = 2;
  State state = 3;
  FlagValue value = 4; // Required when state is ENABLED, ignored otherwise.
  string actor = 5;
}

message SetFlagOverrideResponse {}

message RemoveFlagOverrideRequest {
  string flag_id = 1;
  string entity_id = 2;
  string actor = 3;
}

message RemoveFlagOverrideResponse {}

message GetAuditLogRequest {
  string flag_id = 1; // Optional: filter by flag. Empty = all flags.
  int32 limit = 2; // Max entries to return. Default 50.
}

message GetAuditLogResponse {
  repeated AuditLogEntry entries = 1;
}

message AuditLogEntry {
  int64 id = 1;
  string flag_id = 2;
  string action = 3;
  FlagValue old_value = 4;
  FlagValue new_value = 5;
  string actor = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ── Launch messages ─────────────────────────────────────────────────

message LaunchDetail {
  string launch_id = 1;
  string scope_feature_id = 2; // empty for cross-feature launches
  string dimension = 3;
  int32 ramp_percentage = 4;
  string status = 5; // CREATED, ACTIVE, SOAKING, COMPLETED, ABANDONED
  google.protobuf.Timestamp killed_at = 6;
  repeated string affected_features = 7;
  string description = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string ramp_source = 11; // unspecified, config, cli, ui
  repeated int32 ramp_steps = 12; // launch-defined rollout progression; empty = UI defaults
}

message ListLaunchesRequest {
  string feature_id = 1; // Optional: filter by feature. Empty = all launches.
}

message ListLaunchesResponse {
  repeated LaunchDetail launches = 1;
}

message GetLaunchRequest {
  string launch_id = 1;
}

message GetLaunchResponse {
  LaunchDetail launch = 1;
}

message UpdateLaunchRampRequest {
  string launch_id = 1;
  int32 ramp_percentage = 2;
  string source = 3; // "cli" or "ui"
}

message UpdateLaunchRampResponse {
  string warning = 1; // non-empty if ramp_source was "config" (next sync will overwrite)
}

message UpdateLaunchStatusRequest {
  string launch_id = 1;
  string status = 2; // CREATED, ACTIVE, SOAKING, COMPLETED, ABANDONED
}

message UpdateLaunchStatusResponse {}

message KillLaunchRequest {
  string launch_id = 1;
}

message KillLaunchResponse {}

message UnkillLaunchRequest {
  string launch_id = 1;
}

message UnkillLaunchResponse {}

// ── Sync lock messages ──────────────────────────────────────────────

// OverrideSource identifies where an override / lock action was issued
// from. Used for audit attribution.
enum OverrideSource {
  OVERRIDE_SOURCE_UNSPECIFIED = 0;
  OVERRIDE_SOURCE_CLI = 1;
  OVERRIDE_SOURCE_UI = 2;
  OVERRIDE_SOURCE_AUTOMATION = 3;
}

message AcquireSyncLockRequest {
  string reason = 1; // required
}

message AcquireSyncLockResponse {
  // Populated when the lock was newly acquired.
  google.protobuf.Timestamp held_since = 1;
}

message ReleaseSyncLockRequest {
  string reason = 1; // required — captured in the audit row
}

message ReleaseSyncLockResponse {}

message GetSyncLockRequest {}

message GetSyncLockResponse {
  // Populated when the lock is currently held; absent fields = unlocked.
  bool held = 1;
  string actor = 2;
  string reason = 3;
  google.protobuf.Timestamp held_since = 4;
}

// ── Condition override messages ─────────────────────────────────────

message SetConditionOverrideRequest {
  string flag_id = 1;
  // 0-based index into the condition chain. Omit (oneof absence) to
  // override the static/compiled default.
  optional int32 condition_index = 2;
  FlagValue value = 3;
  string reason = 4; // required — incident ticket, explanation
  OverrideSource source = 5; // defaults to CLI if unspecified
}

message SetConditionOverrideResponse {
  // Non-empty when the flag is managed by config-as-code; the next sync
  // will clear this override.
  string warning = 1;
  // The value at this position from the compiled chain (or static default)
  // before the override was applied. Populated even on first-time overrides
  // so the operator sees what value they replaced.
  FlagValue original_value = 2;
  // The value of the prior override row at this position, when this Set
  // replaced an existing override. Nil on first-time overrides.
  FlagValue previous_override_value = 3;
}

message ClearConditionOverrideRequest {
  string flag_id = 1;
  // Omit to clear the static-default override.
  optional int32 condition_index = 2;
  string reason = 3; // required — captured in the audit row
}

message ClearConditionOverrideResponse {}

message ClearAllConditionOverridesRequest {
  string flag_id = 1;
  string reason = 2; // required — captured in the audit row
}

message ClearAllConditionOverridesResponse {
  int32 cleared_count = 1;
}

message ListConditionOverridesRequest {
  // Optional: filter by flag.
  string flag_id = 1;
  // Optional: only show overrides older than this many seconds.
  int64 min_age_seconds = 2;
  // Optional: filter by actor (case-insensitive substring).
  string actor = 3;
}

message ListConditionOverridesResponse {
  repeated ConditionOverrideListEntry entries = 1;
}

message ConditionOverrideListEntry {
  string flag_id = 1;
  optional int32 condition_index = 2;
  FlagValue override_value = 3;
  OverrideSource source = 4;
  string actor = 5;
  string reason = 6;
  google.protobuf.Timestamp created_at = 7;
}
