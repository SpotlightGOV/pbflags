syntax = "proto3";
package pbflags.v1;

import "google/protobuf/timestamp.proto";
import "pbflags/options.proto";
import "pbflags/v1/types.proto";

option go_package = "github.com/SpotlightGOV/pbflags/gen/pbflags/v1;pbflagsv1";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.v1.proto";

// FlagAdmin is the UI-facing API for flag management. Used by admin
// dashboards to manage flag state, overrides, and view audit logs.
// Flag definitions are read directly from descriptors.pb via filesystem mount.
service FlagAdminService {
  rpc ListFeatures(ListFeaturesRequest) returns (ListFeaturesResponse);
  rpc GetFlag(GetFlagRequest) returns (GetFlagResponse);
  rpc UpdateFlagState(UpdateFlagStateRequest) returns (UpdateFlagStateResponse);
  rpc SetFlagOverride(SetFlagOverrideRequest) returns (SetFlagOverrideResponse);
  rpc RemoveFlagOverride(RemoveFlagOverrideRequest) returns (RemoveFlagOverrideResponse);
  rpc GetAuditLog(GetAuditLogRequest) returns (GetAuditLogResponse);

  // Launch lifecycle RPCs.
  rpc ListLaunches(ListLaunchesRequest) returns (ListLaunchesResponse);
  rpc GetLaunch(GetLaunchRequest) returns (GetLaunchResponse);
  rpc UpdateLaunchRamp(UpdateLaunchRampRequest) returns (UpdateLaunchRampResponse);
  rpc UpdateLaunchStatus(UpdateLaunchStatusRequest) returns (UpdateLaunchStatusResponse);
  rpc KillLaunch(KillLaunchRequest) returns (KillLaunchResponse);
  rpc UnkillLaunch(UnkillLaunchRequest) returns (UnkillLaunchResponse);
}

message ListFeaturesRequest {}

message ListFeaturesResponse {
  repeated FeatureDetail features = 1;
}

message FeatureDetail {
  string feature_id = 1;
  string description = 2;
  string owner = 3;
  repeated FlagDetail flags = 4;
}

message FlagDetail {
  string flag_id = 1;
  string display_name = 2;
  string description = 3;
  FlagType flag_type = 4;
  string layer = 5;
  State state = 6;
  FlagValue default_value = 7;
  FlagValue current_value = 8;
  repeated FlagOverrideDetail overrides = 9;

  // Metadata from proto descriptors.
  pbflags.SupportedValues supported_values = 10;
  bool archived = 11;
}

message FlagOverrideDetail {
  string entity_id = 1;
  State state = 2;
  FlagValue value = 3;
}

message GetFlagRequest {
  string flag_id = 1;
}

message GetFlagResponse {
  FlagDetail flag = 1;
}

message UpdateFlagStateRequest {
  string flag_id = 1;
  State state = 2;
  FlagValue value = 3; // Optional: set value at the same time.
  string actor = 4;
}

message UpdateFlagStateResponse {}

// Validates: flag must have a non-GLOBAL layer. Value type must match flag type.
message SetFlagOverrideRequest {
  string flag_id = 1;
  string entity_id = 2;
  State state = 3;
  FlagValue value = 4; // Required when state is ENABLED, ignored otherwise.
  string actor = 5;
}

message SetFlagOverrideResponse {}

message RemoveFlagOverrideRequest {
  string flag_id = 1;
  string entity_id = 2;
  string actor = 3;
}

message RemoveFlagOverrideResponse {}

message GetAuditLogRequest {
  string flag_id = 1; // Optional: filter by flag. Empty = all flags.
  int32 limit = 2; // Max entries to return. Default 50.
}

message GetAuditLogResponse {
  repeated AuditLogEntry entries = 1;
}

message AuditLogEntry {
  int64 id = 1;
  string flag_id = 2;
  string action = 3;
  FlagValue old_value = 4;
  FlagValue new_value = 5;
  string actor = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ── Launch messages ─────────────────────────────────────────────────

message LaunchDetail {
  string launch_id = 1;
  string scope_feature_id = 2; // empty for cross-feature launches
  string dimension = 3;
  int32 ramp_percentage = 4;
  string status = 5; // CREATED, ACTIVE, SOAKING, COMPLETED, ABANDONED
  google.protobuf.Timestamp killed_at = 6;
  repeated string affected_features = 7;
  string description = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ListLaunchesRequest {
  string feature_id = 1; // Optional: filter by feature. Empty = all launches.
}

message ListLaunchesResponse {
  repeated LaunchDetail launches = 1;
}

message GetLaunchRequest {
  string launch_id = 1;
}

message GetLaunchResponse {
  LaunchDetail launch = 1;
}

message UpdateLaunchRampRequest {
  string launch_id = 1;
  int32 ramp_percentage = 2;
}

message UpdateLaunchRampResponse {}

message UpdateLaunchStatusRequest {
  string launch_id = 1;
  string status = 2; // CREATED, ACTIVE, SOAKING, COMPLETED, ABANDONED
}

message UpdateLaunchStatusResponse {}

message KillLaunchRequest {
  string launch_id = 1;
}

message KillLaunchResponse {}

message UnkillLaunchRequest {
  string launch_id = 1;
}

message UnkillLaunchResponse {}
