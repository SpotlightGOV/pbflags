syntax = "proto3";
package pbflags;

import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/SpotlightGOV/pbflags/gen/pbflags;pbflagspb";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.proto";

// Applied to a message to mark it as a feature.
message FeatureOptions {
  // Stable identifier for this feature. Used as the DB primary key.
  // MUST be unique across all features. MUST NOT change once set.
  // Convention: snake_case, e.g., "notifications", "billing_v2".
  string id = 1;

  string description = 2;
  // Owner team for the feature (for UI grouping / contact).
  string owner = 3;

  // Evaluation scopes this feature is available in. Each scope name must
  // match a (pbflags.scope) defined at file level. The codegen produces
  // feature accessor methods only on scope types listed here.
  repeated string scopes = 4;
}

// Scope definition. Applied as a file-level option (repeatable).
// Each scope defines a named execution context with a set of dimensions
// beyond the globally required ones.
message ScopeOptions {
  // Unique name for this scope (e.g., "anon", "user", "tenant").
  string name = 1;
  // Additional dimensions this scope provides beyond globally required ones.
  // Globally required dimensions (presence: REQUIRED) are implicit in every scope.
  repeated string dimensions = 2;
}

// Applied to a field to mark it as a flag.
message FlagOptions {
  string description = 1;

  // Default value (type must match the field type).
  FlagDefault default = 2;

  reserved 3; // was: Layer layer (enum, removed in favor of string layer)

  // Suggested values for the UI dropdown. Not enforced at evaluation time.
  // Can be overridden in the UI when setting values.
  SupportedValues supported_values = 4;

  reserved 5; // was: string layer (removed; evaluation context replaces layers)
}

// List wrapper messages for FlagDefault. These are structurally identical to
// the v1.BoolList/StringList/etc. messages but defined here to avoid an import
// cycle (v1/admin.proto already imports this package).
message FlagDefaultBoolList {
  repeated bool values = 1;
}
message FlagDefaultStringList {
  repeated string values = 1;
}
message FlagDefaultInt64List {
  repeated int64 values = 1;
}
message FlagDefaultDoubleList {
  repeated double values = 1;
}

// Uses wrapper types to distinguish "default is false/0" from "no default set."
// In proto3, bare bool false and int64 0 are default values and won't serialize
// in a oneof, making them indistinguishable from "not set."
message FlagDefault {
  oneof value {
    google.protobuf.BoolValue bool_value = 1;
    google.protobuf.StringValue string_value = 2;
    google.protobuf.Int64Value int64_value = 3;
    google.protobuf.DoubleValue double_value = 4;
    // List defaults — use types from this package to avoid import cycle
    // (v1/admin.proto imports pbflags/options.proto, so options.proto
    // cannot import v1/types.proto).
    FlagDefaultBoolList bool_list_value = 5;
    FlagDefaultStringList string_list_value = 6;
    FlagDefaultInt64List int64_list_value = 7;
    FlagDefaultDoubleList double_list_value = 8;
  }
}

message SupportedValues {
  // At most one of these should be populated, matching the flag's field type.
  // Validated at schema sync time (not enforced by proto structure).
  repeated string string_values = 1;
  repeated int64 int64_values = 2;
  repeated double double_values = 3;
  // (bool flags don't need supported_values — it's always true/false)
}

// Applied to a message to mark it as the evaluation context.
// Exactly one message in the input files must carry this annotation.
// Each field defines a context dimension (string, enum, bool, or int64).
message ContextOptions {}

// DimensionDistribution classifies a dimension's value distribution for
// cache key strategy and launch eligibility.
//
// Wire-compatible with the old hashable bool (field 2): true (varint 1)
// decodes as DIMENSION_DISTRIBUTION_UNIFORM (enum value 1).
enum DimensionDistribution {
  DIMENSION_DISTRIBUTION_UNSPECIFIED = 0;
  // High cardinality, stable values. Suitable for percentage-based hashing
  // (launches, experiments). E.g., user_id, session_id.
  DIMENSION_DISTRIBUTION_UNIFORM = 1;
  // Low/bounded cardinality. Enum-like. Not suitable for hashing.
  // E.g., plan_level, region. Enum and bool proto fields are inherently
  // categorical — inferred from the proto type, no annotation needed.
  DIMENSION_DISTRIBUTION_CATEGORICAL = 2;
}

// DimensionPresence classifies whether a dimension is always set.
enum DimensionPresence {
  DIMENSION_PRESENCE_UNSPECIFIED = 0;
  // Always present. Consumer must set it.
  DIMENSION_PRESENCE_REQUIRED = 1;
  // May be absent (e.g., user_id when logged out).
  DIMENSION_PRESENCE_OPTIONAL = 2;
}

// Applied to a field within the context message to define a dimension.
message DimensionOptions {
  string description = 1;
  // Replaces the old hashable (bool, field 2) and bounded (bool, field 3).
  // Wire-compatible: old hashable: true (varint 1 on field 2) decodes as
  // DIMENSION_DISTRIBUTION_UNIFORM (enum value 1). Old bounded: true on
  // field 3 is ignored (field 3 is no longer declared).
  DimensionDistribution distribution = 2;
  // Fields 2 and 3 were previously hashable (bool) and bounded (bool).
  // The distribution enum subsumes both. Field 3 is reserved.
  reserved 3;
  // Whether this dimension is always present in evaluation contexts.
  DimensionPresence presence = 4;
}

// Extension field numbers 51000-51005 are reserved for pbflags.
// Protobuf does not support `reserved` inside extend blocks, so this
// reservation is by convention only. Do not reuse these numbers:
//   51000: feature (MessageOptions) — active
//   51001: flag (FieldOptions) — active
//   51002: was layers (EnumOptions) — removed, do not reuse
//   51003: context (MessageOptions) — active
//   51004: dimension (FieldOptions) — active
//   51005: scope (FileOptions) — active
extend google.protobuf.MessageOptions {
  optional FeatureOptions feature = 51000;
  optional ContextOptions context = 51003;
}

extend google.protobuf.FieldOptions {
  optional FlagOptions flag = 51001;
  optional DimensionOptions dimension = 51004;
}

extend google.protobuf.FileOptions {
  repeated ScopeOptions scope = 51005;
}
