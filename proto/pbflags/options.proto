syntax = "proto3";
package pbflags;

import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/SpotlightGOV/pbflags/gen/pbflags;pbflagspb";
option java_multiple_files = true;
option java_package = "org.spotlightgov.pbflags.proto";

// Applied to a message to mark it as a feature.
message FeatureOptions {
  // Stable identifier for this feature. Used as the DB primary key.
  // MUST be unique across all features. MUST NOT change once set.
  // Convention: snake_case, e.g., "notifications", "billing_v2".
  string id = 1;

  string description = 2;
  // Owner team for the feature (for UI grouping / contact).
  string owner = 3;
}

// Applied to a field to mark it as a flag.
message FlagOptions {
  string description = 1;

  // Default value (type must match the field type).
  FlagDefault default = 2;

  reserved 3; // was: Layer layer (enum, removed in favor of string layer)

  // Suggested values for the UI dropdown. Not enforced at evaluation time.
  // Can be overridden in the UI when setting values.
  SupportedValues supported_values = 4;

  // Override layer name. Must match a value from the enum annotated with
  // option (pbflags.layers) = true, using the prefix-stripped, lowercase
  // enum value name (e.g., LAYER_ENTITY → "entity").
  // Empty or "global" means no per-entity overrides.
  string layer = 5;
}

// List wrapper messages for FlagDefault. These are structurally identical to
// the v1.BoolList/StringList/etc. messages but defined here to avoid an import
// cycle (v1/admin.proto already imports this package).
message FlagDefaultBoolList {
  repeated bool values = 1;
}
message FlagDefaultStringList {
  repeated string values = 1;
}
message FlagDefaultInt64List {
  repeated int64 values = 1;
}
message FlagDefaultDoubleList {
  repeated double values = 1;
}

// Uses wrapper types to distinguish "default is false/0" from "no default set."
// In proto3, bare bool false and int64 0 are default values and won't serialize
// in a oneof, making them indistinguishable from "not set."
message FlagDefault {
  oneof value {
    google.protobuf.BoolValue bool_value = 1;
    google.protobuf.StringValue string_value = 2;
    google.protobuf.Int64Value int64_value = 3;
    google.protobuf.DoubleValue double_value = 4;
    // List defaults — use types from this package to avoid import cycle
    // (v1/admin.proto imports pbflags/options.proto, so options.proto
    // cannot import v1/types.proto).
    FlagDefaultBoolList bool_list_value = 5;
    FlagDefaultStringList string_list_value = 6;
    FlagDefaultInt64List int64_list_value = 7;
    FlagDefaultDoubleList double_list_value = 8;
  }
}

message SupportedValues {
  // At most one of these should be populated, matching the flag's field type.
  // Validated at schema sync time (not enforced by proto structure).
  repeated string string_values = 1;
  repeated int64 int64_values = 2;
  repeated double double_values = 3;
  // (bool flags don't need supported_values — it's always true/false)
}

// Extension field numbers 51000-51002 are reserved for pbflags.
extend google.protobuf.MessageOptions {
  optional FeatureOptions feature = 51000;
}

extend google.protobuf.FieldOptions {
  optional FlagOptions flag = 51001;
}

// Applied to an enum to mark it as the layer definition for this flag system.
// Exactly one enum in the input files must carry this annotation.
// Enum values define the set of valid layer names. Convention:
//   - Ordinal 0 is always unspecified (treated as global).
//   - Values whose prefix-stripped name is "global" are global layers.
//   - All other values define per-entity override dimensions.
//   - Value names should follow UPPER_SNAKE_CASE with a shared prefix
//     (e.g., LAYER_USER, LAYER_ENTITY).
extend google.protobuf.EnumOptions {
  optional bool layers = 51002;
}
