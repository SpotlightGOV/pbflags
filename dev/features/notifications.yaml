# Demo conditions config for the notifications feature.
# Exercises condition chains, static values, and otherwise clauses.
feature: notifications

flags:
  email_enabled:
    conditions:
      # Dogfood: all internal users see email enabled
      - when: "ctx.is_internal"
        value: true
      # Enterprise tier always gets email
      - when: "ctx.plan == PlanLevel.ENTERPRISE"
        value: true
      - when: "ctx.plan == PlanLevel.PRO"
        value: false
        launch:
          id: email_enabled_pro_rollout
          value: true
      - otherwise: false

  digest_frequency:
    conditions:
      - when: "ctx.plan == PlanLevel.ENTERPRISE"
        value: "hourly"
      - when: "ctx.plan == PlanLevel.PRO"
        value: "daily"
        launch:
          id: hourly_digest_rollout
          value: "hourly"
      - otherwise: "weekly"

  max_retries:
    conditions:
      - when: "ctx.is_internal"
        value: 10
      - when: "ctx.plan == 3"
        value: 5
      - otherwise: 3

  score_threshold:
    value: 0.75
    launch:
      id: scoring_experiment
      value: 0.5

  notification_emails:
    value:
      - ops@example.com
      - alerts@example.com

  retry_delays:
    value:
      - 1
      - 5
      - 30
      - 120

# Feature-scoped launches — dimension and ramp only.
# Both launches use session_id (globally required) rather than user_id so
# they're valid for both the 'anon' and 'user' scopes the feature targets.
launches:
  email_enabled_pro_rollout:
    dimension: session_id
    ramp_percentage: 25
    description: "Roll out email for Pro users"

  hourly_digest_rollout:
    dimension: session_id
    description: "Roll out hourly digest for Pro users"

# scoring_experiment is a cross-feature launch defined in launches/scoring_experiment.yaml.
# It's referenced here via launch: {id: scoring_experiment} on score_threshold above.
