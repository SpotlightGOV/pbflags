# Demo conditions config for the notifications feature.
# Exercises condition chains, static values, and otherwise clauses.
feature: notifications

flags:
  email_enabled:
    conditions:
      # Dogfood: all internal users see email enabled
      - when: "ctx.is_internal"
        value: true
      # Enterprise tier always gets email
      - when: "ctx.plan == PlanLevel.ENTERPRISE"
        value: true
      - otherwise: false

  digest_frequency:
    conditions:
      - when: "ctx.plan == PlanLevel.ENTERPRISE"
        value: "hourly"
      - when: "ctx.plan == PlanLevel.PRO"
        value: "daily"
      - otherwise: "weekly"

  max_retries:
    conditions:
      - when: "ctx.is_internal"
        value: 10
      - when: "ctx.plan == 3"
        value: 5
      - otherwise: 3

  score_threshold:
    value: 0.75

  notification_emails:
    value:
      - ops@example.com
      - alerts@example.com

  retry_delays:
    value:
      - 1
      - 5
      - 30
      - 120

# Percentage-based rollouts.
launches:
  email_enabled_pro_rollout:
    flag: email_enabled
    dimension: user_id
    population: "ctx.plan == PlanLevel.PRO"
    value: true
    ramp_percentage: 25

  hourly_digest_rollout:
    flag: digest_frequency
    dimension: user_id
    value: "hourly"
