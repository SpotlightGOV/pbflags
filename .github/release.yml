changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking
    - title: "Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Infrastructure"
      labels:
        - ci
        - infra
        - docker
    - title: "Testing"
      labels:
        - testing
    - title: "Documentation"
      labels:
        - docs
    - title: "Other Changes"
      labels:
        - "*"
