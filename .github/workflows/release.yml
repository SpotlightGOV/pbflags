name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag and branch conventions
        id: release-meta
        run: |
          TAG="${{ github.ref_name }}"
          TAG_COMMIT="$(git rev-list -n1 "$TAG")"

          # Parse version components.
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            echo "::error::Tag ${TAG} does not match vMAJOR.MINOR.PATCH"
            exit 1
          fi

          RELEASE_BRANCH="release/${MAJOR}.${MINOR}.0"

          if [ "$PATCH" = "0" ]; then
            # Minor/major release — must be on main.
            if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
              echo "::error::Tag ${TAG} (minor/major) must be on main, but commit ${TAG_COMMIT} is not."
              exit 1
            fi
            echo "source_branch=main" >> "$GITHUB_OUTPUT"
            echo "create_release_branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          else
            # Patch release — must be on the corresponding release branch.
            if ! git ls-remote --exit-code origin "refs/heads/${RELEASE_BRANCH}" >/dev/null 2>&1; then
              echo "::error::Patch release ${TAG} requires branch ${RELEASE_BRANCH}, which does not exist."
              exit 1
            fi
            if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${RELEASE_BRANCH}"; then
              echo "::error::Tag ${TAG} (patch) must be on ${RELEASE_BRANCH}, but commit ${TAG_COMMIT} is not."
              exit 1
            fi
            echo "source_branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "create_release_branch=" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Generate AI release notes
        run: .github/scripts/generate-release-notes.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
      - name: Verify release notes
        run: |
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "---"
          [ -s release-notes.md ] || { echo "ERROR: release-notes.md is empty"; exit 1; }
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply release notes
        run: gh release edit "${{ github.ref_name }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit release notes to repo
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET_BRANCH="${{ steps.release-meta.outputs.source_branch }}"
          NOTES_FILE="docs/releasenotes/${VERSION}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            mkdir -p docs/releasenotes
            cp release-notes.md "$NOTES_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$NOTES_FILE"
            git commit -m "Add ${VERSION} release notes"
            # Pull-rebase in case the branch advanced since checkout (e.g.,
            # someone pushed release notes manually before CI got here).
            git pull --rebase origin "${TARGET_BRANCH}" || true
            git push origin "HEAD:${TARGET_BRANCH}" || echo "WARNING: Could not push release notes commit. Notes may already exist on ${TARGET_BRANCH}."
          fi
      - name: Create release branch
        if: steps.release-meta.outputs.create_release_branch != ''
        run: |
          BRANCH="${{ steps.release-meta.outputs.create_release_branch }}"
          git checkout -b "$BRANCH" "${{ github.ref_name }}"
          git push origin "$BRANCH"
          echo "Created release branch: $BRANCH"

  buf-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: buf push proto
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
