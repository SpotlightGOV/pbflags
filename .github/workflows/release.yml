name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: |
          TAG_COMMIT="$(git rev-list -n1 "${{ github.ref_name }}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} points to commit ${TAG_COMMIT} which is not on main."
            echo "Tags must point to commits reachable from main. Delete the tag, commit to main, and re-tag."
            exit 1
          fi
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Generate AI release notes
        run: .github/scripts/generate-release-notes.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
      - name: Verify release notes
        run: |
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "---"
          [ -s release-notes.md ] || { echo "ERROR: release-notes.md is empty"; exit 1; }
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply release notes
        run: gh release edit "${{ github.ref_name }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit release notes to repo
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES_FILE="docs/releasenotes/${VERSION}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            mkdir -p docs/releasenotes
            cp release-notes.md "$NOTES_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$NOTES_FILE"
            git commit -m "Add ${VERSION} release notes"
            git push origin HEAD:main
          fi

  buf-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: buf push proto
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
