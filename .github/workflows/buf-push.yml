name: Buf Push

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.yaml"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf push proto
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
